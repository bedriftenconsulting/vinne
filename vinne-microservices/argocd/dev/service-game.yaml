apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-game-dev
  namespace: argocd
  labels:
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: service-game=ghcr.io/nexalabshq/rand-game:develop
    argocd-image-updater.argoproj.io/service-game.update-strategy: latest
    argocd-image-updater.argoproj.io/service-game.allow-tags: regexp:^develop-[a-f0-9]{7}$
    argocd-image-updater.argoproj.io/service-game.helm.image-name: image.tag
    argocd-image-updater.argoproj.io/service-game.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-dev
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  source:
    repoURL: https://github.com/nexalabshq/rand-microservices
    targetRevision: develop
    path: helm/microservices/charts/service-game
    helm:
      releaseName: service-game-dev
      valueFiles:
        - ../../values.yaml
        - ../../values-dev.yaml
      values: |
        fullnameOverride: service-game-dev
