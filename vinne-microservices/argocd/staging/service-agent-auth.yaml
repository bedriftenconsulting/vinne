apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-agent-auth-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: service-agent-auth=ghcr.io/nexalabshq/rand-agent-auth:staging
    argocd-image-updater.argoproj.io/service-agent-auth.update-strategy: latest
    argocd-image-updater.argoproj.io/service-agent-auth.allow-tags: regexp:^staging-[a-f0-9]{7}$
    argocd-image-updater.argoproj.io/service-agent-auth.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/service-agent-auth.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nexalabshq/rand-microservices
    targetRevision: staging
    path: helm/microservices/charts/service-agent-auth
    helm:
      valueFiles:
        - ../../values.yaml
        - ../../values-staging.yaml
      values: |
        global:
          registry: ghcr.io
          imagePrefix: nexalabshq
          imagePullSecrets:
            - name: ghcr-secret
          environment: staging
          database:
            host: postgres.database.svc.cluster.local
            port: 5432
          redis:
            host: redis.cache.svc.cluster.local
            port: 6379
          kafka:
            bootstrapServers: kafka-bootstrap.kafka.svc.cluster.local:9092
          vault:
            enabled: true
            address: http://vault.vault.svc.cluster.local:8200
            authPath: auth/kubernetes
            role: microservices
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
