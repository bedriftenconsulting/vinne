apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-agent-auth-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nexalabshq/rand-microservices
    targetRevision: main
    path: helm/microservices/charts/service-agent-auth
    helm:
      valueFiles:
        - ../../values.yaml
        - ../../values-prod.yaml
      values: |
        global:
          registry: ghcr.io
          imagePrefix: nexalabshq
          imagePullSecrets:
            - name: ghcr-secret
          environment: production
          database:
            host: postgres.database.svc.cluster.local
            port: 5432
          redis:
            host: redis.cache.svc.cluster.local
            port: 6379
          kafka:
            bootstrapServers: kafka-bootstrap.kafka.svc.cluster.local:9092
          vault:
            enabled: true
            address: http://vault.vault.svc.cluster.local:8200
            authPath: auth/kubernetes
            role: microservices
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    # Manual sync for production
    automated: false
  revisionHistoryLimit: 10
