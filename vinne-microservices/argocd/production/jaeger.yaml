apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  project: default
  source:
    repoURL: https://github.com/nexalabshq/rand-microservices
    targetRevision: main
    path: helm/jaeger
    helm:
      valueFiles:
        - values.yaml
  syncPolicy:
    # Manual sync for production
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true