global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:16686']

  - job_name: 'admin-auth'
    static_configs:
      - targets: ['service-admin-auth:8080']

  - job_name: 'admin-management'
    static_configs:
      - targets: ['service-admin-management:8080']

  - job_name: 'agent-auth'
    static_configs:
      - targets: ['service-agent-auth:8080']

  - job_name: 'games'
    static_configs:
      - targets: ['service-games:8080']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['apollo-router:4000']