syntax = "proto3";

package ticket;

option go_package = "github.com/randco/randco-microservices/services/service-ticket/proto;ticketpb";

import "google/protobuf/timestamp.proto";

// TicketService defines the gRPC service for ticket management
service TicketService {
  // IssueTicket creates a new lottery ticket
  rpc IssueTicket(IssueTicketRequest) returns (IssueTicketResponse);

  // GetTicket retrieves a ticket by ID
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);

  // GetTicketBySerial retrieves a ticket by serial number
  rpc GetTicketBySerial(GetTicketBySerialRequest) returns (GetTicketBySerialResponse);

  // ListTickets retrieves a paginated list of tickets with optional filters
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);

  // ValidateTicket marks a ticket as validated and checks for winnings
  rpc ValidateTicket(ValidateTicketRequest) returns (ValidateTicketResponse);

  // CancelTicket cancels a ticket before validation
  rpc CancelTicket(CancelTicketRequest) returns (CancelTicketResponse);

  // VoidTicket voids a ticket (administrative action)
  rpc VoidTicket(VoidTicketRequest) returns (VoidTicketResponse);

  // ReprintTicket generates a reprint of an existing ticket
  rpc ReprintTicket(ReprintTicketRequest) returns (ReprintTicketResponse);

  // CheckWinnings checks if a ticket has winnings without validating
  rpc CheckWinnings(CheckWinningsRequest) returns (CheckWinningsResponse);

  // GetTopPerformingAgents retrieves top performing agents by revenue
  rpc GetTopPerformingAgents(GetTopPerformingAgentsRequest) returns (GetTopPerformingAgentsResponse);

  // GetAllTicketsForDraw retrieves all tickets for a specific draw without pagination limits
  // This is specifically for internal service-to-service calls (e.g., draw processing)
  rpc GetAllTicketsForDraw(GetAllTicketsForDrawRequest) returns (GetAllTicketsForDrawResponse);
}

// BetLine represents a single bet line on a ticket
message BetLine {
  int32 line_number = 1;
  string bet_type = 2;
  repeated int32 numbers = 3;
  repeated int32 banker = 4;
  repeated int32 opposed = 5;
  int64 amount = 6;
}

// SecurityFeatures contains ticket security information
message SecurityFeatures {
  string qr_code = 1;
  string barcode = 2;
  string verification_code = 3;
}

// IssuerDetails contains information about who issued the ticket
message IssuerDetails {
  string terminal_id = 1;
  string agent_code = 2;
  string location = 3;
}

// Ticket represents a lottery ticket
message Ticket {
  string id = 1;
  string serial_number = 2;
  string game_code = 3;
  string game_schedule_id = 4;
  int32 draw_number = 5;
  google.protobuf.Timestamp draw_date = 6;
  repeated int32 selected_numbers = 7;
  repeated BetLine bet_lines = 8;
  string issuer_type = 9;
  string issuer_id = 10;
  IssuerDetails issuer_details = 11;
  string customer_phone = 12;
  string customer_email = 13;
  string payment_method = 14;
  int64 unit_price = 15;
  int64 total_amount = 16;
  string security_hash = 17;
  SecurityFeatures security_features = 18;
  string status = 19;
  int64 winning_amount = 20;
  google.protobuf.Timestamp validated_at = 21;
  google.protobuf.Timestamp cancelled_at = 22;
  google.protobuf.Timestamp voided_at = 23;
  string cancelled_reason = 24;
  string voided_reason = 25;
  google.protobuf.Timestamp created_at = 26;
  google.protobuf.Timestamp updated_at = 27;
  repeated int32 banker_numbers = 28;
  repeated int32 opposed_numbers = 29;
}

// IssueTicketRequest contains the information needed to issue a new ticket
message IssueTicketRequest {
  string game_code = 1;
  string game_schedule_id = 2;
  int32 draw_number = 3;
  repeated int32 selected_numbers = 4;
  repeated BetLine bet_lines = 5;
  string issuer_type = 6;
  string issuer_id = 7;
  IssuerDetails issuer_details = 8;
  string customer_phone = 9;
  string customer_email = 10;
  string payment_method = 11;
}

// IssueTicketResponse contains the newly issued ticket
message IssueTicketResponse {
  Ticket ticket = 1;
}

// GetTicketRequest requests a ticket by ID
message GetTicketRequest {
  string ticket_id = 1;
}

// GetTicketResponse returns a ticket
message GetTicketResponse {
  Ticket ticket = 1;
}

// GetTicketBySerialRequest requests a ticket by serial number
message GetTicketBySerialRequest {
  string serial_number = 1;
}

// GetTicketBySerialResponse returns a ticket
message GetTicketBySerialResponse {
  Ticket ticket = 1;
}

// TicketFilter defines filtering options for listing tickets
message TicketFilter {
  string status = 1;
  string game_code = 2;
  int32 draw_number = 3;
  string issuer_type = 4;
  string issuer_id = 5;
  google.protobuf.Timestamp start_date = 6;
  google.protobuf.Timestamp end_date = 7;
}

// ListTicketsRequest requests a paginated list of tickets
message ListTicketsRequest {
  TicketFilter filter = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// ListTicketsResponse returns a paginated list of tickets
message ListTicketsResponse {
  repeated Ticket tickets = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// ValidateTicketRequest validates a ticket
message ValidateTicketRequest {
  string ticket_id = 1;
  string validator_id = 2;
  string validator_type = 3;
}

// ValidateTicketResponse returns the validated ticket
message ValidateTicketResponse {
  Ticket ticket = 1;
  int64 winning_amount = 2;
}

// CancelTicketRequest cancels a ticket
message CancelTicketRequest {
  string ticket_id = 1;
  string reason = 2;
  string cancelled_by = 3;
}

// CancelTicketResponse returns the cancelled ticket
message CancelTicketResponse {
  Ticket ticket = 1;
}

// VoidTicketRequest voids a ticket
message VoidTicketRequest {
  string ticket_id = 1;
  string reason = 2;
  string voided_by = 3;
}

// VoidTicketResponse returns the voided ticket
message VoidTicketResponse {
  Ticket ticket = 1;
}

// ReprintTicketRequest requests a ticket reprint
message ReprintTicketRequest {
  string ticket_id = 1;
  string reprinted_by = 2;
  string terminal_id = 3;
}

// ReprintTicketResponse returns the reprinted ticket
message ReprintTicketResponse {
  Ticket ticket = 1;
}

// CheckWinningsRequest checks ticket winnings
message CheckWinningsRequest {
  string ticket_id = 1;
}

// CheckWinningsResponse returns winning information
message CheckWinningsResponse {
  bool has_winnings = 1;
  int64 winning_amount = 2;
  string status = 3;
}

// AgentPerformance represents performance metrics for a single agent
message AgentPerformance {
  string agent_id = 1;
  string agent_code = 2;
  string agent_name = 3;
  int64 total_revenue = 4;         // in pesewas
  double total_revenue_ghs = 5;    // in GHS
  int64 total_tickets = 6;
  int32 retailer_count = 7;        // number of retailers under this agent
}

// GetTopPerformingAgentsRequest requests top performing agents
message GetTopPerformingAgentsRequest {
  string date = 1;             // optional, format: YYYY-MM-DD, defaults to today
  int32 limit = 2;             // number of agents to return, default 10
  string period = 3;           // period type: "daily", "monthly", "yearly", default "monthly"
}

// GetTopPerformingAgentsResponse returns top performing agents
message GetTopPerformingAgentsResponse {
  repeated AgentPerformance agents = 1;
  string period = 2;           // the period that was queried
  string date = 3;             // the date that was queried
}

// GetAllTicketsForDrawRequest requests all tickets for a specific draw
// This is an internal service-to-service call for draw processing
message GetAllTicketsForDrawRequest {
  string draw_id = 1;          // UUID of the draw
  string status = 2;           // optional ticket status filter (e.g., "issued")
}

// GetAllTicketsForDrawResponse returns all tickets for the draw
message GetAllTicketsForDrawResponse {
  repeated Ticket tickets = 1;
  int64 total = 2;             // total number of tickets found
}
