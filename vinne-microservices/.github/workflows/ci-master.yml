  validate-version-support:
    name: Validate Version Support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Version variables in all services
        run: |
          echo "Checking for Version variable in all service main.go files..."

          failed=false
          for service_dir in services/*/cmd/server; do
            if [ -f "$service_dir/main.go" ]; then
              service_name=$(basename $(dirname $(dirname "$service_dir")))
              echo -n "Checking $service_name... "

              if grep -q "Version.*=.*\"dev\"" "$service_dir/main.go"; then
                echo "✓ Version variable found"
              else
                echo "✗ Missing Version variable!"
                failed=true
              fi
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "ERROR: Some services are missing Version variables."
            echo "Please add the following to the main.go file:"
            echo ""
            echo "var ("
            echo "    Version        = \"dev\""
            echo "    GitBranch      = \"unknown\""
            echo "    GitCommit      = \"unknown\""
            echo "    GitCommitCount = \"0\""
            echo "    BuildTime      = \"unknown\""
            echo ")"
            exit 1
          fi

          echo ""
          echo "✓ All services have Version variables configured"

      - name: Check Dockerfile ldflags support
        run: |
          echo "Checking for ldflags version injection in Dockerfiles..."

          failed=false
          for dockerfile in services/*/Dockerfile; do
            if [ -f "$dockerfile" ]; then
              service_name=$(basename $(dirname "$dockerfile"))
              echo -n "Checking $service_name Dockerfile... "

              if grep -q "ldflags.*Version" "$dockerfile"; then
                echo "✓ Version injection configured"
              else
                echo "✗ Missing version injection!"
                failed=true
              fi
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "ERROR: Some Dockerfiles are missing version injection."
            echo "Please ensure Dockerfiles include ldflags with version information."
            exit 1
          fi

          echo ""
          echo "✓ All Dockerfiles have version injection configured"
