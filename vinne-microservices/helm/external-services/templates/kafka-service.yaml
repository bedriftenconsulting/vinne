apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: external-services
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  ports:
    - port: {{ .Values.kafka.broker.port }}
      targetPort: {{ .Values.kafka.broker.port }}
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka
  namespace: external-services
subsets:
  - addresses:
      - ip: {{ .Values.kafka.broker.host }}
    ports:
      - port: {{ .Values.kafka.broker.port }}