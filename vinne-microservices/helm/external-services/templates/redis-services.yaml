{{- range $service, $config := .Values.redis }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-{{ $service }}
  namespace: external-services
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  ports:
    - port: {{ $config.port }}
      targetPort: {{ $config.port }}
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-{{ $service }}
  namespace: external-services
subsets:
  - addresses:
      - ip: {{ $config.host }}
    ports:
      - port: {{ $config.port }}
{{- end }}