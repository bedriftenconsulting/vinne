apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Service configuration
  SERVICE_NAME: "service-player"
  SERVER_PORT: "50064"
  SERVER_MODE: "dev"
  ENVIRONMENT: "dev"
  LOGGING_LEVEL: "info"
  LOGGING_FORMAT: "json"
  JWT_ISSUER: "randlotteryltd-player-service"

  # Database configuration
  DATABASE_HOST: "postgres-player.external-services.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "player_service"
  DATABASE_USER: "player"
  DATABASE_SSL_MODE: "disable"
  DATABASE_MAX_OPEN_CONNS: "25"
  DATABASE_MAX_IDLE_CONNS: "10"
  DATABASE_CONN_MAX_LIFETIME: "1800s"
  DATABASE_CONN_MAX_IDLE_TIME: "600s"

  # Redis configuration
  REDIS_HOST: "redis-player.external-services.svc.cluster.local"
  REDIS_PORT: "6390"
  REDIS_DB: "0"

  # Tracing configuration
  TRACING_ENABLED: "true"
  TRACING_JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"
  TRACING_SERVICE_NAME: "player-service"
  TRACING_SERVICE_VERSION: "1.0.0"
  TRACING_SAMPLE_RATE: "1.0"
  TRACING_ENVIRONMENT: "dev"

  # Kafka configuration
  KAFKA_BROKERS: "kafka.external-services.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "player-service-group"
  KAFKA_TOPIC_PREFIX: "randco"

  # Jaeger configuration
  JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"

  # Service dependencies
  SERVICES_NOTIFICATION_SERVICE: "service-notification-dev:50063"
  SERVICES_WALLET_SERVICE: "service-wallet-dev:50059"
  SERVICES_PAYMENT_SERVICE: "service-payment-dev:50061"

  # Security configuration (non-sensitive)
  SECURITY_JWT_ISSUER: "randlotteryltd"
  SECURITY_PASSWORD_MIN_LENGTH: "8"
  SECURITY_BCRYPT_COST: "10"
  SECURITY_ACCESS_TOKEN_EXPIRY: "3600s"
  SECURITY_REFRESH_TOKEN_EXPIRY: "168h"
  SECURITY_SESSION_EXPIRY: "168h"
  SECURITY_LOCKOUT_DURATION: "30m"
