apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Server configuration
  SERVER_PORT: "50052"
  SERVER_MODE: "development"

  # Database configuration (non-sensitive)
  DATABASE_HOST: "postgres-agent-auth.external-services.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "agent_auth"
  DATABASE_USER: "agent"
  DATABASE_SSL_MODE: "disable"
  DATABASE_MAX_OPEN_CONNS: "25"
  DATABASE_MAX_IDLE_CONNS: "5"
  DATABASE_CONN_MAX_LIFETIME: "300s"

  # Redis configuration (non-sensitive)
  REDIS_HOST: "redis-agent-auth.external-services.svc.cluster.local"
  REDIS_PORT: "6381"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"
  REDIS_MIN_IDLE_CONNS: "5"

  # Security configuration (non-sensitive)
  SECURITY_JWT_ISSUER: "randlotteryltd"
  SECURITY_ACCESS_TOKEN_EXPIRY: "3600s"  # 15 minutes
  SECURITY_REFRESH_TOKEN_EXPIRY: "168h"  # 168 hours (7 days)
  SECURITY_BCRYPT_COST: "10"
  SECURITY_PASSWORD_MIN_LENGTH: "8"
  SECURITY_MAX_FAILED_LOGINS: "5"
  SECURITY_LOCKOUT_DURATION: "30m"  # 30 minutes

  # Kafka configuration
  KAFKA_BROKERS: "kafka.external-services.svc.cluster.local:9092"

  # Logging configuration
  LOGGING_LEVEL: "info"
  LOGGING_FORMAT: "json"

  # Metrics configuration
  METRICS_ENABLED: "true"
  METRICS_PORT: "9092"

  # Environment
  ENVIRONMENT: "development"

  # Service dependencies
  SERVICES_NOTIFICATION_SERVICE: "service-notification-dev:50063"