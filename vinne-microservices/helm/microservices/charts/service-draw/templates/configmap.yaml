apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Service configuration
  SERVICE_NAME: "service-draw"
  SERVER_PORT: "50060"
  SERVER_MODE: "dev"
  ENVIRONMENT: "dev"
  LOGGING_LEVEL: "debug"
  LOGGING_FORMAT: "json"

  # Tracing configuration
  TRACING_ENABLED: "true"
  TRACING_JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"
  TRACING_ENVIRONMENT: "dev"
  TRACING_SERVICE_VERSION: "1.0.0"
  TRACING_SERVICE_NAME: "draw"
  TRACING_SAMPLE_RATE: "1.0"

  # Database configuration
  DATABASE_HOST: "postgres-draw.external-services.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "draw_service"
  DATABASE_USER: "draw"
  DATABASE_SSL_MODE: "disable"
  DATABASE_MAX_OPEN_CONNS: "25"
  DATABASE_MAX_IDLE_CONNS: "5"
  DATABASE_CONN_MAX_LIFETIME: "1800s"
  DATABASE_CONN_MAX_IDLE_TIME: "600s"

  # Redis configuration
  REDIS_HOST: "redis-draw.external-services.svc.cluster.local"
  REDIS_PORT: "6383"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"
  REDIS_MIN_IDLE_CONNS: "5"

  # Security configuration
  SECURITY_JWT_ISSUER: "randlotteryltd"
  SECURITY_BCRYPT_COST: "10"
  SECURITY_PASSWORD_MIN_LENGTH: "8"
  SECURITY_ACCESS_TOKEN_EXPIRY: "3600s"
  SECURITY_REFRESH_TOKEN_EXPIRY: "168h"
  SECURITY_SESSION_EXPIRY: "168h"

  # Metrics configuration
  METRICS_ENABLED: "true"
  METRICS_PORT: "9092"

  # Service version
  SERVICE_VERSION: "1.0.0"

  # Kafka configuration
  KAFKA_BROKERS: "kafka.external-services.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "draw-service-group"
  KAFKA_TOPIC_PREFIX: "randco"

  # Validation configuration (NLA requirements)
  VALIDATION_NLA_API_ENDPOINT: "https://api.nla.gov.gh/v1"
  VALIDATION_REQUIRE_CERTIFICATE: "true"
  VALIDATION_REQUIRE_WITNESS: "true"
  VALIDATION_MIN_DOCUMENTS: "2"
  VALIDATION_VALIDATION_TIMEOUT: "30s"

  # Service dependencies
  SERVICES_GAME_HOST: "service-game-dev"
  SERVICES_GAME_PORT: "50053"
  SERVICES_TICKET_HOST: "service-ticket-dev"
  SERVICES_TICKET_PORT: "50062"
  SERVICES_WALLET_HOST: "service-wallet-dev"
  SERVICES_WALLET_PORT: "50059"

  # Jaeger configuration
  JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"
