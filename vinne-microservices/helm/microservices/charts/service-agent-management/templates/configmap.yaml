apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Service configuration
  SERVICE_NAME: "service-agent-management"
  SERVER_PORT: "50058"
  SERVER_MODE: "dev"
  ENVIRONMENT: "dev"
  LOGGING_LEVEL: "info"
  LOGGING_FORMAT: "json"

  # Database configuration
  DATABASE_HOST: "postgres-agent-management.external-services.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "agent_management"
  DATABASE_USER: "agent_mgmt"
  DATABASE_SSL_MODE: "disable"
  DATABASE_MAX_OPEN_CONNS: "25"
  DATABASE_MAX_IDLE_CONNS: "10"
  DATABASE_CONN_MAX_LIFETIME: "1800"
  DATABASE_CONN_MAX_IDLE_TIME: "600"

  # Redis configuration
  REDIS_HOST: "redis-agent-management.external-services.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Tracing configuration
  TRACING_ENABLED: "true"
  TRACING_JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"
  TRACING_SERVICE_NAME: "agent-management-service"
  TRACING_SERVICE_VERSION: "1.0.0"
  TRACING_SAMPLE_RATE: "1.0"
  TRACING_ENVIRONMENT: "dev"

  # Kafka configuration
  KAFKA_BROKERS: "kafka.external-services.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "agent-management-service-group"
  KAFKA_TOPIC_PREFIX: "randco"

  # Jaeger configuration
  JAEGER_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"

  # Service dependencies
  SERVICES_AGENT_AUTH_SERVICE: "service-agent-auth-dev.microservices-dev.svc.cluster.local:50052"
  SERVICES_WALLET_SERVICE: "service-wallet-dev.microservices-dev.svc.cluster.local:50059"
