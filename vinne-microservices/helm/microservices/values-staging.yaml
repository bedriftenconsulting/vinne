# Staging environment overrides
global:
  environment: staging
  
service-api-gateway:
  image:
    tag: staging
  replicaCount: 2
  ingress:
    hosts:
      - host: api.dev.randlottery.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-staging-tls
        hosts:
          - api.dev.randlottery.com

