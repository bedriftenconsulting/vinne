# Production environment overrides
global:
  environment: production
  
service-api-gateway:
  image:
    tag: main
  replicaCount: 3
  ingress:
    hosts:
      - host: api.dev.randlottery.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-prod-tls
        hosts:
          - api.dev.randlottery.com
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

