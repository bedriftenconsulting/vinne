name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexalabshq/rand-admin-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmmss'}}
            type=raw,value={{branch}}

      - name: Set build environment
        id: build-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "BUILD_ENV=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "BUILD_ENV=staging" >> $GITHUB_OUTPUT
          else
            echo "BUILD_ENV=development" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            BUILD_ENV=${{ steps.build-env.outputs.BUILD_ENV }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Update Helm Chart version
        if: github.event_name == 'push'
        run: |
          # Update Chart.yaml with new version using semantic versioning
          # Format: major.minor.patch+buildYYYYMMDDHHMMSS
          CHART_VERSION="1.0.0+build$(date +%Y%m%d%H%M%S)"
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" helm/admin-web/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.sha }}\"/" helm/admin-web/Chart.yaml
          
      - name: Package Helm Chart
        if: github.event_name == 'push'
        run: |
          helm package helm/admin-web
          
      - name: Trigger ArgoCD Sync
        if: github.event_name == 'push'
        run: |
          # This would typically trigger ArgoCD to sync
          # For now, ArgoCD will auto-sync based on the branch
          echo "Image published: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.sha }}"
          echo "ArgoCD will automatically sync the ${{ github.ref_name }} environment"