# Production environment values

replicaCount: 3

image:
  tag: "main"

imagePullSecrets:
  - name: ghcr-secret

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: admin.randlottery.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: admin-prod-tls
      hosts:
        - admin.randlottery.com

config:
  apiUrl: "https://api.randlottery.com"
  environment: "production"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true