# Staging environment values

replicaCount: 2

image:
  tag: "staging"

imagePullSecrets:
  - name: ghcr-secret

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: admin.staging.randlottery.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: admin-staging-tls
      hosts:
        - admin.staging.randlottery.com

config:
  apiUrl: "https://api.staging.randlottery.com"
  environment: "staging"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80