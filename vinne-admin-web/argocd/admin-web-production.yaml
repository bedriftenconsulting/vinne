apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-web-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nexalabshq/rand-admin-web
    targetRevision: main
    path: helm/admin-web
    helm:
      valueFiles:
        - values-production.yaml
      parameters:
        - name: image.tag
          value: main  # This will use the latest main tag
  destination:
    server: https://kubernetes.default.svc
    namespace: randlottery-production
  syncPolicy:
    # Manual sync for production
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 10