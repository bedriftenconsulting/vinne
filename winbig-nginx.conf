server {
    server_name winbig.bedriften.xyz;

    root /var/www/winbig;
    index index.html;

    # USSD callback proxied to Node app on port 5000
    location /ussd/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/winbig.bedriften.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winbig.bedriften.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = winbig.bedriften.xyz) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name winbig.bedriften.xyz;
    return 404;
}
